{% extends 'base.html' %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Join the Platform</h2>
                    <p class="text-muted small">Become part of the municipal digital revolution.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-4 form-group-premium">
                        <label class="form-label-premium">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn-glass w-100 py-3 mt-3">Create Account</button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted">Already have an account? <a href="{% url 'login' %}"
                            class="text-dark fw-bold">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.classList.add('form-control-premium');

            // Apply placeholder from label
            const group = input.closest('.form-group-premium');
            if (group) {
                const label = group.querySelector('label');
                if (label && (!input.placeholder || input.placeholder === '')) {
                    input.placeholder = label.innerText.replace(':', '').trim();
                }
            }
        });
    });
</script>
{% endblock %}
